<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f2937" id="themeColor">
  <title>Lojalumo kortelė</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
  <link rel="apple-touch-icon" href="./icon-192.png">
</head>
<body>
  <main id="app">
    <div class="loading">Kraunama…</div>
  </main>

  <!-- PIN modal: cashier types the PIN on the CUSTOMER's phone -->
  <dialog id="pinModal">
    <h2 id="pinTitle">Darbuotojo PIN</h2>
    <p class="pin-hint">Parodykite telefoną darbuotojui</p>
    <div class="pin-dots" id="pinDots"><span></span><span></span><span></span><span></span></div>
    <div class="pin-pad" id="pinPad"></div>
    <button class="pin-cancel" id="pinCancel">Atšaukti</button>
  </dialog>

  <script type="module" src="./app.js"></script>
</body>
</html>
