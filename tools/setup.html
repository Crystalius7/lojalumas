<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Naujo verslo prijungimas — Lojalumas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f4; display: grid; place-items: center; min-height: 100vh; padding: 24px; }
  .wrap { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 16px; }
  .box { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgb(0 0 0 / .07); }
  h1 { font-size: 1.2rem; margin-bottom: 16px; }
  label { font-size: .8rem; font-weight: 700; color: #57534e; display: block; margin: 12px 0 4px; }
  input { width: 100%; padding: 10px; border: 1px solid #d6d3d1; border-radius: 8px; font-size: .95rem; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  pre {
    background: #1c1917; color: #a7f3a0; border-radius: 12px;
    padding: 16px; font-size: .8rem; overflow-x: auto; line-height: 1.5;
    white-space: pre-wrap; word-break: break-all;
  }
  button {
    margin-top: 16px; width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: #1c2937; color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer;
  }
  .hint { font-size: .8rem; color: #78716c; margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <div class="box">
    <h1>➕ Naujo verslo prijungimas</h1>
    <div class="row">
      <div><label>Slug (URL dalis, be tarpų)</label><input id="fSlug" value="coffeebox" pattern="[a-z0-9-]+"></div>
      <div><label>Darbuotojo PIN (4 skaitmenys)</label><input id="fPin" value="" maxlength="4" inputmode="numeric" placeholder="pvz. 4482"></div>
    </div>
    <div><label>Verslo pavadinimas</label><input id="fName" value="Coffee Box Kaunas"></div>
    <div class="row">
      <div><label>Firminė spalva</label><input id="fColor" type="color" value="#FF5733" style="height:42px"></div>
      <div><label>Antspaudų skaičius</label><input id="fStamps" type="number" value="10" min="3" max="20"></div>
    </div>
    <div><label>Prizo tekstas</label><input id="fReward" value="Nemokamas didelis kapučinas"></div>
    <div><label>Logotipo URL (nebūtina)</label><input id="fLogo" value="" placeholder="/logos/coffeebox.png"></div>
    <button id="gen">Generuoti konfigūraciją</button>
  </div>

  <div class="box" id="outBox" hidden>
    <h1>📋 Įklijuokite į <code>tenants.js</code></h1>
    <pre id="out"></pre>
    <button id="copy">Kopijuoti</button>
    <p class="hint">Įklijavę bloką į <b>public/tenants.js</b> ir įkėlę pakeitimą,
    kortelė veiks adresu <b id="urlPreview"></b>. Tada sugeneruokite QR standą:
    <a href="/tools/standee.html">standee generatorius</a>.</p>
  </div>
</div>

<script>
  async function sha256(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, '0')).join('');
  }

  document.getElementById('gen').onclick = async () => {
    const slug = document.getElementById('fSlug').value.trim().toLowerCase();
    const pin = document.getElementById('fPin').value.trim();
    if (!/^[a-z0-9-]+$/.test(slug)) return alert('Slug gali turėti tik mažąsias raides, skaičius ir brūkšnelius.');
    if (!/^\d{4}$/.test(pin)) return alert('PIN turi būti 4 skaitmenys.');

    const hash = await sha256(`${slug}:${pin}`);
    const snippet =
`  ${slug}: {
    business_name: '${document.getElementById('fName').value.replace(/'/g, "\\'")}',
    logo_url: '${document.getElementById('fLogo').value}',
    primary_color: '${document.getElementById('fColor').value}',
    stamps_needed: ${parseInt(document.getElementById('fStamps').value, 10) || 10},
    reward_text: '${document.getElementById('fReward').value.replace(/'/g, "\\'")}',
    pin_hash: '${hash}', // PIN žinokite tik jūs ir verslo savininkas
  },`;

    document.getElementById('out').textContent = snippet;
    document.getElementById('urlPreview').textContent = `${location.origin}/${slug}`;
    document.getElementById('outBox').hidden = false;
  };

  document.getElementById('copy').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('out').textContent);
    document.getElementById('copy').textContent = '✓ Nukopijuota';
    setTimeout(() => (document.getElementById('copy').textContent = 'Kopijuoti'), 1500);
  };
</script>
</body>
</html>
